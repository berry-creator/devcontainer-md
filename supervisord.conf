[supervisord]
nodaemon=true

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1280x720x24
autorestart=true
priority=10

[program:xfce]
command=startxfce4
environment=DISPLAY=:99
autorestart=true
priority=20

[program:x11vnc]
command=x11vnc -display :99 -nopw -forever -shared
autorestart=true
priority=30

[program:novnc]
command=websockify --web=/usr/share/novnc 6080 localhost:5900
autorestart=true
priority=40
